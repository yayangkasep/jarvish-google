services:
  antigravity-manager:
    image: lbjlaq/antigravity-manager:latest
    container_name: antigravity-manager
    volumes:
      # Map a clean directory for Antigravity's internal databases
      - ./antigravity_data:/root/.antigravity_tools
    environment:
      - LOG_LEVEL=info
      - API_KEY=test
      - ABV_BIND_LOCAL_ONLY=false
    ports:
      - "8045:8045"
    restart: unless-stopped
    
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8081:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081/
    env_file:
      # Inject securely configured environment variables from J.A.R.V.I.S
      - ${HOME}/.jarvish/.env
    volumes:
      - ./searxng:/etc/searxng
    restart: unless-stopped
